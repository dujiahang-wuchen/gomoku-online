<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>五子棋</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section id="loginView" class="platform-view auth-view" hidden>
      <div class="platform-panel">
        <p class="eyebrow">Game Hub</p>
        <h1>小游戏大厅</h1>
        <p class="platform-copy">先用游客身份进入，之后可以从大厅选择五子棋或新的小游戏。</p>
        <label class="nickname-field platform-name-field">
          <span>昵称</span>
          <input id="guestNameInput" type="text" maxlength="16" autocomplete="nickname" />
        </label>
        <button id="enterLobby" type="button">游客进入</button>
      </div>
    </section>

    <section id="lobbyView" class="platform-view lobby-view" hidden>
      <div class="lobby-shell">
        <header class="lobby-header">
          <div>
            <p class="eyebrow">Game Hub</p>
            <h1>游戏大厅</h1>
          </div>
          <details class="profile-panel">
            <summary>
              <span>玩家信息</span>
              <strong id="profileSummaryName">玩家</strong>
            </summary>
            <label class="profile-edit">
              <span>当前玩家</span>
              <input id="profileNameInput" type="text" maxlength="16" autocomplete="nickname" />
            </label>
            <div class="profile-actions">
              <button id="saveProfile" class="secondary-button profile-button" type="button">保存昵称</button>
              <button id="logoutLobby" class="secondary-button profile-button" type="button">退出登录</button>
            </div>
          </details>
        </header>
        <div class="game-grid" aria-label="游戏列表">
          <button id="startGomoku" class="game-card" type="button">
            <span class="game-card-title">五子棋</span>
            <span class="game-card-meta">本地双人 / 人机 / 好友联机</span>
            <span class="game-card-action">开始游戏</span>
          </button>
          <div class="game-card coming-soon" aria-label="更多游戏开发中">
            <span class="game-card-title">更多游戏</span>
            <span class="game-card-meta">以后可以继续添加象棋、井字棋等。</span>
            <span class="game-card-action">开发中</span>
          </div>
        </div>
      </div>
    </section>

    <main id="gameView" class="app" hidden>
      <section class="play-area" aria-label="五子棋棋盘">
        <canvas id="board" width="760" height="760"></canvas>
      </section>

      <aside class="panel">
        <header>
          <div class="title-row">
            <div>
              <p class="eyebrow">Gomoku</p>
              <h1>五子棋</h1>
            </div>
            <div class="title-actions">
              <span id="gameProfileName" class="game-profile-name">玩家</span>
              <button id="backLobby" class="secondary-button lobby-button" type="button">大厅</button>
              <button id="logoutGame" class="secondary-button lobby-button" type="button">退出</button>
              <button id="themeToggle" class="theme-toggle" type="button" aria-label="切换深色模式">黑色</button>
            </div>
          </div>
        </header>

        <div class="status-card">
          <span id="turnStone" class="stone black" aria-hidden="true"></span>
          <div>
            <p class="label">当前回合</p>
            <p id="statusText" class="status">黑棋先手</p>
            <p id="playerBadge" class="player-badge" hidden>你执黑棋</p>
          </div>
        </div>

        <div class="controls" aria-label="游戏控制">
          <button id="newGame" type="button">新局</button>
          <button id="undo" type="button">悔棋</button>
        </div>

        <details class="settings collapsible" aria-label="设置">
          <summary>设置</summary>
          <label class="toggle">
            <input id="aiToggle" type="checkbox" />
            <span>人机对弈</span>
          </label>
          <label class="select-row">
            <span>执棋</span>
            <select id="playerColor">
              <option value="black">黑棋</option>
              <option value="white">白棋</option>
            </select>
          </label>
          <label class="select-row">
            <span>难度</span>
            <select id="aiLevel">
              <option value="easy">简单</option>
              <option value="normal" selected>普通</option>
              <option value="hard">困难</option>
            </select>
          </label>
        </details>

        <details class="invite collapsible" aria-label="邀请好友对决">
          <summary>好友对决</summary>
          <div class="invite-head">
            <div>
              <p class="label">好友对决</p>
              <p id="connectionText" class="connection">未连接</p>
              <p id="roomMeta" class="room-meta">未创建房间</p>
            </div>
          </div>
          <div class="invite-actions">
            <button id="createInvite" type="button">创建邀请</button>
            <button id="joinInvite" type="button">加入邀请</button>
            <button id="copyInvite" type="button">复制链接</button>
            <button id="syncRoom" type="button">同步棋局</button>
            <button id="leaveRoom" type="button">退出房间</button>
            <button id="acceptAnswer" type="button">确认回应</button>
          </div>
          <label class="nickname-field">
            <span>昵称</span>
            <input id="nicknameInput" type="text" maxlength="16" autocomplete="nickname" />
          </label>
          <label class="code-field">
            <span>邀请码</span>
            <textarea id="inviteCode" rows="3" spellcheck="false"></textarea>
          </label>
          <label class="code-field">
            <span>回应码</span>
            <textarea id="answerCode" rows="3" spellcheck="false"></textarea>
          </label>
          <p class="hint">用服务器打开时，创建邀请会生成链接，好友打开即可加入。</p>
        </details>

        <details class="chat collapsible" aria-label="房间聊天">
          <summary>房间聊天</summary>
          <div class="chat-head">
            <p class="label">房间聊天</p>
            <p id="chatStatus" class="chat-status">联机后可聊天</p>
          </div>
          <div id="chatMessages" class="chat-messages" aria-live="polite"></div>
          <form id="chatForm" class="chat-form">
            <input id="chatInput" type="text" maxlength="160" placeholder="输入消息" autocomplete="off" />
            <button id="sendChat" type="submit">发送</button>
          </form>
        </details>

        <div class="score">
          <div>
            <span id="blackScoreLabel" class="score-label">黑棋</span>
            <strong id="blackScore">0</strong>
          </div>
          <div>
            <span id="whiteScoreLabel" class="score-label">白棋</span>
            <strong id="whiteScore">0</strong>
          </div>
          <button id="clearScore" class="secondary-button clear-score" type="button">清空战绩</button>
        </div>

        <details class="moves-panel collapsible" aria-label="落子记录">
          <summary>落子记录</summary>
          <ol id="moveList" class="moves"></ol>
        </details>
      </aside>
    </main>

    <div id="winnerDialog" class="winner-dialog" hidden>
      <div class="winner-box" role="dialog" aria-modal="true" aria-labelledby="winnerTitle">
        <p class="label">本局结束</p>
        <h2 id="winnerTitle">黑棋胜利</h2>
        <p id="winnerMessage" class="winner-message">棋盘会保留，方便复盘最后局面。</p>
        <div class="winner-actions">
          <button id="winnerRematch" type="button">再来一局</button>
          <button id="winnerClose" class="secondary-button" type="button">先看看</button>
        </div>
      </div>
    </div>

    <div id="noticeToast" class="notice-toast" role="status" aria-live="polite" hidden></div>

    <script src="./script.js"></script>
  </body>
</html>
